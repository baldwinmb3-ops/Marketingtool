const refs=imageViewerRefs();
const stage=refs?refs.stage:null;
const point=marketerImageViewer.pointers.get(e.pointerId);
const wasMulti=marketerImageViewer.hadMultiTouch;
marketerImageViewer.pointers.delete(e.pointerId);
if(stage){try{stage.releasePointerCapture(e.pointerId);}catch{}}
if(isAnyResourceImageViewerOpen()&&e.pointerType==='touch'&&!wasMulti&&point){
const activeRefs=imageViewerRefs();
if(activeRefs){
const rect=activeRefs.stage.getBoundingClientRect(),tapX=point.x-rect.left,tapY=point.y-rect.top,nowMs=Date.now(),last=marketerImageViewer.lastTapPoint;
if(marketerImageViewer.lastTapTime&&(nowMs-marketerImageViewer.lastTapTime)<=320&&last&&Math.hypot(last.x-tapX,last.y-tapY)<=26){
setImageViewerScaleAtPoint(marketerImageViewer.scale<1.6?2.5:1,tapX,tapY);
marketerImageViewer.lastTapTime=0;
marketerImageViewer.lastTapPoint=null;
}else{
marketerImageViewer.lastTapTime=nowMs;
marketerImageViewer.lastTapPoint={x:tapX,y:tapY};
}
}
}
if(marketerImageViewer.pointers.size>=2){
const pts=Array.from(marketerImageViewer.pointers.values());
const dist=Math.hypot(pts[0].x-pts[1].x,pts[0].y-pts[1].y);
marketerImageViewer.pinchStart={distance:Math.max(1,dist),scale:marketerImageViewer.scale,tx:marketerImageViewer.tx,ty:marketerImageViewer.ty};
marketerImageViewer.panStart=null;
marketerImageViewer.hadMultiTouch=true;
return;
}
if(marketerImageViewer.pointers.size===1){
const pt=Array.from(marketerImageViewer.pointers.values())[0];
marketerImageViewer.panStart={x:pt.x,y:pt.y,tx:marketerImageViewer.tx,ty:marketerImageViewer.ty};
marketerImageViewer.pinchStart=null;
marketerImageViewer.hadMultiTouch=false;
return;
}
marketerImageViewer.panStart=null;
marketerImageViewer.pinchStart=null;
marketerImageViewer.hadMultiTouch=false;
if(wasMulti){marketerImageViewer.lastTapTime=0;marketerImageViewer.lastTapPoint=null;}
});
app.addEventListener('pointercancel',e=>{if(marketerImageViewer.pointers.has(e.pointerId)){marketerImageViewer.pointers.delete(e.pointerId);}if(!marketerImageViewer.pointers.size){marketerImageViewer.panStart=null;marketerImageViewer.pinchStart=null;marketerImageViewer.hadMultiTouch=false;}});
app.addEventListener('wheel',e=>{
if(!isAnyResourceImageViewerOpen())return;
if(!e.target||typeof e.target.closest!=='function')return;
const stage=e.target.closest('[data-role="image-viewer-stage"]');
if(!stage||!app.contains(stage))return;
e.preventDefault();
const rect=stage.getBoundingClientRect(),pointX=e.clientX-rect.left,pointY=e.clientY-rect.top,factor=Math.exp(-e.deltaY*0.0015);
setImageViewerScaleAtPoint(marketerImageViewer.scale*factor,pointX,pointY);
},{passive:false});
window.addEventListener('resize',()=>{if(!isAnyResourceImageViewerOpen())return;window.requestAnimationFrame(()=>initializeImageViewer(false));});
window.addEventListener('beforeunload',e=>{const hasUnsaved=!!(s.role==='admin'&&s.adminHasUnsavedChanges),needsBackupWarning=!!(s.role==='admin'&&backupGuardrailNeedsAction());try{if(s.role==='admin'){s.adminHasUnsavedChanges=false;}save();}catch{}if(hasUnsaved||needsBackupWarning){e.preventDefault();e.returnValue='';}});
window.addEventListener('storage',e=>{if(!e||e.key!==K||!e.newValue)return;try{const next=JSON.parse(String(e.newValue||''));syncDiag('storage-event',syncDiagSummary(next));applyStorageSnapshot(next);}catch(err){syncDiag('storage-error',{message:String((err&&err.message)||err||'unknown')});}});
window.pricingSyncDiag=()=>{const rows=marketerBrandRows(),sample=rows.slice(0,12).map(r=>r.label);const payload={summary:syncDiagSummary(s),searchTerm:String(s.searchTerm||''),visibleBrandCount:rows.length,sampleBrands:sample};syncDiag('manual-snapshot',payload);return payload;};
clearMarketerBottomTotalsKeepHurdle();
render();
startBookingCloudPolling();
startRemoteCatalogPolling();
startOnDutyManagersPolling();
void authQueueStartupSessionStabilization();
</script>
<script>
if("serviceWorker" in navigator){
const cleanupLegacyServiceWorkers=async()=>{
try{
const registrations=await navigator.serviceWorker.getRegistrations();
await Promise.all(registrations.map(registration=>registration.unregister().catch(()=>false)));
}catch{}
try{
if(window.caches&&typeof window.caches.keys==='function'){
const cacheNames=await window.caches.keys();
await Promise.all(cacheNames.map(name=>window.caches.delete(name).catch(()=>false)));
}
}catch{}
};
window.addEventListener("load",()=>{
if(DEFAULT_ENABLE_SERVICE_WORKER){
navigator.serviceWorker.register("./service-worker.js").catch(()=>{});
return;
}
void cleanupLegacyServiceWorkers();
});
}
